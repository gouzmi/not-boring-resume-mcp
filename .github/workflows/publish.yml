name: Publish to PyPI

# Tag-driven release. Push a tag like `v0.1.1` to:
#   1. verify the tag matches `project.version` in pyproject.toml
#   2. build the sdist + wheel
#   3. create the matching GitHub Release
#   4. publish to PyPI (trusted publishing, no token)
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match pyproject version '$PROJECT_VERSION'."
            echo "Bump 'version' in pyproject.toml to $TAG_VERSION (or retag) before releasing."
            exit 1
          fi
          echo "Releasing version $PROJECT_VERSION"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The PyPI "Trusted Publisher" config must reference this environment.
    environment:
      name: pypi
      url: https://pypi.org/p/not-boring-resume-mcp
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
