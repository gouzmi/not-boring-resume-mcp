name: CI

# Runs on every pull request and on pushes to `main`:
#   - lint  — `ruff format --check` and `ruff check`
#   - test  — installs Chromium via Playwright, then runs `pytest`
#
# Note: the test suite renders the live default CV from notboringresume.cloud,
# so it needs network access and will fail if the site is down.
on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        run: uv run pytest
