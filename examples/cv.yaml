about:
  description: >
    Nine years of selling paper, pranking Dwight, and looking at a documentary
    camera crew like they're the only ones who understand me. I started at
    Dunder Mifflin expecting to leave in six months — I stayed nine years,
    became co-manager, fell in love with the receptionist, and somehow ended up
    in sports marketing before coming back. I thrive in chaotic open-floor-plan
    environments with inadequate HR support and at least one delusional regional
    manager. Currently open to roles where my skill set — sales, leadership, and
    turning staplers into dessert — are considered assets.
experiences:
  - company: Dunder Mifflin Paper Company
    year: 2005 - 2013
    position: Senior Sales Representative
    description: >
      - **Consistently top 3 salesman** in the Scranton branch, despite spending
      an estimated **40% of work hours** on Dwight-related operations.

      - Survived **three different regional managers**, two branch mergers, one
      Threat Level Midnight screening, and a company-wide purge that deleted
      everyone's contacts.

      - Served as **Co-Manager** (briefly) before Michael Scott reasserted
      dominance in a meeting that lasted four hours.

      - Masterminded the **Fax from Future Dwight** campaign, the **Gaydar**
      incident, and the legendary **desk-in-the-bathroom** relocation project.
  - company: Athlead / Athleap
    year: 2013 - 2014
    position: Co-Founder & Sports Marketing Executive
    description: >
      - Co-founded a sports marketing startup in Philadelphia. **Relocated
      family**, pitched investors, secured athletes.

      - Company renamed to **Athleap** after a trademark dispute — rebranding
      completed in one afternoon.

      - Returned to Scranton for wife. **No regrets** (some regrets).
  - company: Dunder Mifflin — Stamford Branch
    year: 2006 - 2007
    position: Sales Representative (Voluntary Exile)
    description: >
      - Requested transfer to Stamford, CT to **professionally process
      unresolved feelings for a coworker who was engaged to someone else**. HR
      approved. HR did not ask follow-up questions.

      - Ranked **#1 salesman** in Stamford despite significant internal
      distraction.

      - Branch closed. Was forced to return to Scranton. She had not left Roy
      yet. **Incredible.**
  - company: Dunder Mifflin Paper Company
    year: 2014 - 2015
    position: Sales Representative (Return Arc)
    description: >
      - Returned to Scranton office. Resumed prank operations. **Dwight had not
      learned.**

      - Supported Pam's artistic career while selling reams of paper. Work-life
      balance: excellent.
